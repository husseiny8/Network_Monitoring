{% block title %}جزئیات گزارش | پایش شبکه{% endblock %}
{% block content %}
<section class="panel">

    <h1>گزارش تحلیلی</h1>

      <a class="btn secondary" href="#">دانلود PDF</a>

    </div>
  </div>
  <div class="report-summary">
    <div class="summary-box">

      <strong>14</strong>
