{% extends "base.html" %}
{% block title %}فرم دستگاه | پایش شبکه{% endblock %}
{% block content %}
<section class="page-header">
  <div>
    <h1>افزودن / ویرایش دستگاه</h1>
    <p class="muted">فرم آماده برای اتصال به فرم‌های Django.</p>
  </div>
</section>

<section class="panel">
  <form class="form-grid">
    <label>نام دستگاه
      <input type="text" placeholder="مثلاً Router-01">
    </label>
    <label>IP Address
      <input type="text" placeholder="192.168.1.1">
    </label>
    <label>نوع دستگاه
      <select>
        <option>Router</option><option>Switch</option><option>Server</option><option>Website</option>
      </select>
    </label>
    <label>وضعیت
      <select>
        <option>Online</option><option>Warning</option><option>Down</option>
      </select>
    </label>
    <label class="full-width">توضیحات
      <textarea rows="4" placeholder="توضیحات تکمیلی..."></textarea>
    </label>
    <div class="form-actions full-width">
      <button class="btn primary" type="submit">ذخیره</button>
      <button class="btn secondary" type="button">انصراف</button>
    </div>
  </form>
</section>
{% endblock %}
