{% extends "base.html" %}
{% block title %}فرم کاربر | پایش شبکه{% endblock %}
{% block content %}
<section class="page-header"><div><h1>{% if target %}ویرایش کاربر{% else %}افزودن کاربر{% endif %}</h1></div></section>
<section class="panel">
  <form class="form-grid" method="post" action="{% if target %}{% url "user_edit" target.id %}{% else %}{% url "user_create" %}{% endif %}">
    {% csrf_token %}
    <label>نام<input type="text" name="username" value="{{ submitted.username|default:"" }}" required></label>
    <label>ایمیل<input type="email" name="email" value="{{ submitted.email|default:"" }}"></label>
    <label>نقش
      <select name="role">
        <option value="Administrator" {% if submitted.role == "Administrator" %}selected{% endif %}>Administrator</option>
        <option value="Operator" {% if submitted.role == "Operator" %}selected{% endif %}>Operator</option>
        <option value="Viewer" {% if submitted.role == "Viewer" or not submitted %}selected{% endif %}>Viewer</option>
      </select>
    </label>
    <label>رمز عبور{% if target %} (در صورت تغییر وارد کنید){% endif %}<input type="password" name="password" {% if not target %}required{% endif %}></label>
    <div class="form-actions full-width"><button class="btn primary" type="submit">ذخیره</button></div>
  </form>
</section>
{% endblock %}
