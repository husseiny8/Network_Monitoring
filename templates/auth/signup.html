{% load static %}
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ثبت نام | Network Monitor</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="auth-page">
  <div class="auth-wrap">
    <div class="auth-card">
      <img src="{% static 'images/login.png' %}" class="auth-logo" alt="Logo">
      <h1>ثبت نام در سامانه</h1>
      <p class="muted">برای دسترسی به داشبورد حساب کاربری خود را ایجاد کنید.</p>

      <form class="auth-form" method="post" action="{% url "signup" %}">
          {% csrf_token %}
          <label for="inputUserName">نام کاربری</label>
          <label>
              <input type="text" name="username" placeholder="UserName" required autofocus>
          </label>

          <label for="inputPassword">رمز عبور</label>
          <label>
              <input type="password" name="password1" placeholder="Password" required>
          </label>

          <label for="inputPassword">تایید رمز عبور</label>
          <label>
              <input type="password" name="password2" placeholder="Confirm Password" required>
          </label>

          <button class="btn primary full-width" type="submit">ثبت نام</button>

      </form>
      <div class="auth-links">
        <a href="{% url "login" %}">حساب کاربری دارید؟</a>
      </div>
    </div>
    <div class="auth-side">
      <img src="{% static 'images/images (1).jpg' %}" alt="Monitoring">
    </div>
  </div>
</body>
</html>
