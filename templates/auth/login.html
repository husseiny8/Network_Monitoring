{% load static %}
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ورود | Network Monitor</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="auth-page">
  <div class="auth-wrap">
    <div class="auth-card">
      <img src="{% static 'images/logo.svg' %}" class="auth-logo" alt="Logo">
      <h1>ورود به سامانه</h1>
      <p class="muted">برای دسترسی به داشبورد وارد حساب کاربری شوید.</p>

      <form method="post" action="{% url "login" %}" class="auth-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn primary full-width" type="submit">ورود</button>
      </form>

      <div class="auth-links">
        <a href="{% url "signup" %}">ثبت نام</a>
      </div>
    </div>
    <div class="auth-side">
      <img src="{% static 'images/monitoring-hero.svg' %}" alt="Monitoring">
    </div>
  </div>
</body>
</html>
