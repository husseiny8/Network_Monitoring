{% extends "base.html" %}
{% block title %}تنظیمات اعلان‌ها | پایش شبکه{% endblock %}
{% block content %}
<section class="page-header"><div><h1>تنظیمات اعلان‌ها</h1><p class="muted">مدیریت پیام‌ها و هشدارها.</p></div></section>
<section class="panel">
  <form method="post" action="{% url "settings_notifications" %}">
    {% csrf_token %}
    <div class="toggle-list">
      <label class="toggle-item"><span>ارسال ایمیل</span><input type="checkbox" name="notify_email" {% if settings.notify_email %}checked{% endif %}></label>
      <label class="toggle-item"><span>ارسال پیام داخل پنل</span><input type="checkbox" name="notify_in_app" {% if settings.notify_in_app %}checked{% endif %}></label>
      <label class="toggle-item"><span>اعلان برای وضعیت بحرانی</span><input type="checkbox" name="notify_on_critical" {% if settings.notify_on_critical %}checked{% endif %}></label>
    </div>
    <div class="form-actions" style="margin-top:16px"><button class="btn primary" type="submit">ذخیره تنظیمات</button></div>
  </form>
</section>
{% endblock %}
