{% load static %}
<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <img src="{% static 'images/logo.svg' %}" alt="Logo" class="brand-logo">
    <div>
      <div class="brand-title">Network Monitor</div>
      <div class="brand-subtitle">Django UI Kit</div>
    </div>
  </div>

  <nav class="nav-menu">
    <a href="{% url "dashboard" %}" class="nav-item{% if request.resolver_match.url_name == "dashboard" %} active{% endif %}">داشبورد</a>
    <a href="{% url "devices" %}" class="nav-item{% if request.resolver_match.url_name == "devices" or request.resolver_match.url_name == "device_detail" %} active{% endif %}">دستگاه‌ها</a>
    <a href="{% url "alerts" %}" class="nav-item{% if request.resolver_match.url_name == "alerts" or request.resolver_match.url_name == "alert_detail" %} active{% endif %}">هشدارها</a>
    <a href="{% url "reports" %}" class="nav-item{% if request.resolver_match.url_name == "reports" or request.resolver_match.url_name == "report_detail" %} active{% endif %}">گزارش‌ها</a>
    {% if request.user.is_staff %}
    <a href="{% url "users" %}" class="nav-item{% if request.resolver_match.url_name == "users" or request.resolver_match.url_name == "user_create" or request.resolver_match.url_name == "user_edit" %} active{% endif %}">کاربران</a>
    {% endif %}
    <a href="{% url "settings" %}" class="nav-item{% if request.resolver_match.url_name == "settings" or request.resolver_match.url_name == "settings_notifications" %} active{% endif %}">تنظیمات</a>
  </nav>

  <div class="sidebar-footer">
    <div class="status-dot"></div>
    <span>سیستم فعال و در حال پایش</span>
  </div>
</aside>
